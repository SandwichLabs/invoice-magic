version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  misspell:
    locale: US
  goimports:
    local-prefixes:
      - github.com/sandwich-labs/invoice-generator-pro

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
