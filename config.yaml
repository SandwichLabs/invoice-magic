# Invoice Generator Pro Configuration

# Directory containing Typst templates
template_dir: ./templates

# Directory for generated output files
output_dir: ./output

# Default template to use if not specified
default_template: default

# Default output format (pdf or html)
default_format: pdf

# Google API Configuration
google:
  # Path to OAuth2 credentials JSON file (download from Google Cloud Console)
  credentials_file: credentials.json
  # Path to store cached OAuth2 token
  token_file: token.json

# Google Sheets Data Source Configuration
sheets:
  # Google Spreadsheet ID (from the URL: https://docs.google.com/spreadsheets/d/{SPREADSHEET_ID}/...)
  spreadsheet_id: ""
  # Name of the sheet/tab containing invoice data
  sheet_name: "Invoices"
  # Row number containing column headers (1-indexed)
  header_row: 1
  # Row number where data starts (1-indexed)
  data_start_row: 2

  # Field mappings: map invoice fields to column names or letters
  # Use column names (matching header row) or column letters (A, B, C, etc.)
  fields:
    # Invoice metadata
    invoice_number: "Invoice Number"
    date: "Date"
    due_date: "Due Date"
    currency: "Currency"

    # Sender information
    sender_name: "Sender Name"
    sender_company: "Sender Company"
    sender_address: "Sender Address"
    sender_tax_id: "Sender Tax ID"
    sender_email: "Sender Email"
    sender_phone: "Sender Phone"

    # Customer information
    customer_name: "Customer Name"
    customer_company: "Customer Company"
    customer_address: "Customer Address"
    customer_tax_id: "Customer Tax ID"
    customer_email: "Customer Email"
    customer_phone: "Customer Phone"

    # Line item (for single-item invoices)
    item_description: "Description"
    item_qty: "Quantity"
    item_unit_price: "Unit Price"
    item_vat: "VAT Rate"

    # Totals (optional - calculated from items if not provided)
    total_net: ""
    total_tax: ""
    total_gross: ""

    # Notes
    notes: "Notes"
