# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: invgen

before:
  hooks:
    - go mod tidy

builds:
  - binary: invgen
    main: ./cmd/invgen
    env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*
      - templates/**/*
      - config.yaml

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: sandwich-labs
    name: invoice-generator-pro
  draft: false
  prerelease: auto
  mode: append
  header: |
    ## Invoice Generator Pro {{ .Tag }}

    Generate professional PDF and HTML invoices from JSON data using Typst.

    ### Prerequisites

    This tool requires the [Typst CLI](https://github.com/typst/typst) to be installed and available in your PATH.

    ### Installation

    Download the appropriate archive for your operating system below.

    ```bash
    # Extract and move to PATH
    tar -xzf invgen_{{ .Version }}_<OS>_<ARCH>.tar.gz
    sudo mv invgen /usr/local/bin/
    ```

    ### Quick Start

    ```bash
    # Generate a PDF invoice
    invgen render --input invoice.json --output invoice.pdf

    # List available templates
    invgen template list
    ```
